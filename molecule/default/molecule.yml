---
# molecule/default/molecule.yml
# Test per: bind9_primary, hardening, packages, nftables
# Driver: Docker (Debian Trixie)

dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker

platforms:
  - name: dns-primary-test
    image: "geerlingguy/docker-debian13-ansible:latest"
    pre_build_image: true
    privileged: true
    command: "/lib/systemd/systemd"
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
    environment:
      DEBIAN_FRONTEND: noninteractive
    groups:
      - dns_primary

  - name: dns-secondary-test
    image: "geerlingguy/docker-debian13-ansible:latest"
    pre_build_image: true
    privileged: true
    command: "/lib/systemd/systemd"
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
    environment:
      DEBIAN_FRONTEND: noninteractive
    groups:
      - dns_secondary

provisioner:
  name: ansible
  env:
    # I role sono nella root del progetto. Molecule esegue il syntax-check
    # dalla cartella dello scenario, dove roles/ non esiste: senza questo
    # path assoluto il converge fallisce con "role 'packages' not found".
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/roles"
  inventory:
    group_vars:
      all:
        dns_primary_ip: "172.17.0.2"
        dns_secondary_ips:
          - "172.17.0.3"
        dns_tsig_key_name: "axfr-key"
        dns_tsig_algorithm: "hmac-sha256"
        dns_tsig_secret: "dGVzdHNlY3JldGtleWZvcm1vbGVjdWxldGVzdA=="
        ddns_key_name: "ddns-key"
        ddns_algorithm: "hmac-sha256"
        ddns_secret: "ZGRuc3Rlc3RzZWNyZXRrZXlmb3Jtb2xlY3VsZQ=="
        ddns_zone: "dyn.example.com"
        ddns_ttl: 60
        dns_domain_base: "example.com"
        dns_admin_email: "hostmaster@example.com"
        dns_zones:
          - name: "example.com"
            file: "zones/example.com.yml"
            type: master
            ddns_enabled: false
        # In Molecule playbook_dir = molecule/default, ma le zone sono nella
        # root del progetto: puntiamo lì via env var di Molecule.
        dns_zones_dir_src: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}"
        bind_user: bind
        bind_group: bind
        bind_config_dir: /etc/bind
        bind_zones_dir: /var/lib/bind/zones
        bind_log_dir: /var/log/named
        bind_transfers_out: 10
        vault_tsig_secret: "dGVzdHNlY3JldGtleWZvcm1vbGVjdWxldGVzdA=="
        vault_ddns_secret: "ZGRuc3Rlc3RzZWNyZXRrZXlmb3Jtb2xlY3VsZQ=="
        vault_proxmox_token_secret: "molecule-test-token"
        vault_grafana_admin_password: "molecule-test-pw"
        vault_alertmanager_smtp_password: "molecule-test-smtp"
        hardening_ssh_authorized_keys: []
        hardening_ansible_user: ansible
        hardening_ssh_alt_port: ~
        nft_ssh_port: 22
        nft_ssh_alt_port: ~
        nft_ssh_allowed_sources: []
        nft_dns_rate_limit_pps: 30
        nft_dns_rate_limit_burst: 50
        nft_dns_udp_response_maxbytes: 512
        nft_icmp_rate_limit: "5/second"
        nft_icmp_rate_limit_burst: 10
        nft_conntrack_max: 65536
        nft_log_dropped: true
        nft_log_prefix_drop: "nft-drop: "
        nft_log_prefix_dns_flood: "nft-dns-flood: "
        nft_extra_tcp_ports: []
        nft_extra_udp_ports: []

  options:
    verbose: false

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
