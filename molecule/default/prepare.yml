---
# molecule/default/prepare.yml
# L'immagine geerlingguy/docker-debian13-ansible ha già systemd, Python,
# sudo e Ansible preinstallati. Installiamo solo i pacchetti di rete
# necessari ai test (nftables, iproute2) non presenti di default.

- name: Prepara container di test
  hosts: all
  become: true
  gather_facts: false
  environment:
    DEBIAN_FRONTEND: noninteractive

  tasks:
    - name: Attendi che i container siano pronti
      ansible.builtin.wait_for_connection:
        timeout: 60

    - name: Aggiorna cache apt
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Installa pacchetti di rete per i test
      ansible.builtin.apt:
        name:
          - nftables
          - iproute2
          - procps
        state: present
