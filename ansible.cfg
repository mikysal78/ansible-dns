[defaults]
inventory           = inventory/hosts.yml
roles_path          = roles
# Host key: accept-new (in ssh_args) = TOFU — accetta host nuovi ma
# rifiuta chiavi CAMBIATE (protegge da MITM dopo il primo contatto)
host_key_checking   = True
retry_files_enabled = False
stdout_callback     = default
result_format       = yaml
callbacks_enabled   = profile_tasks
remote_port	    = 2400

# Interprete Python esplicito: evita il warning di interpreter discovery
# (es. /usr/bin/python3.13) fissando il symlink stabile di sistema
interpreter_python  = /usr/bin/python3

# Vault — decommenta e imposta il path se usi un file password invece di --ask-vault-pass
# vault_password_file = /git/.vault_pass

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
