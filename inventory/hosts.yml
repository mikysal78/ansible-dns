all:
  children:
    # Nodo Proxmox VE — usato solo per creare il template e provisioning VM
    proxmox:
      hosts:
        pve:
          ansible_host: 10.27.22.14         # IP del nodo Proxmox
          ansible_user: root
          ansible_become: true

    dns_primary:
      hosts:
        ns-primary:
          ansible_host: 10.27.22.14        # IP privato/locale hidden primary
          ansible_user: root
          ansible_become: true

    dns_secondary:
      hosts:
        ns1:
          ansible_host: 135.125.196.114        # VPS pubblico 1
          ansible_user: root
          ansible_become: true
          dns_secondary_index: 1
        ns2:
          ansible_host: 135.125.233.182        # VPS pubblico 2
          ansible_user: root
          ansible_become: true
          dns_secondary_index: 2

    # Router OpenWrt per DDNS (opzionale)
    openwrt_routers:
      hosts: {}
