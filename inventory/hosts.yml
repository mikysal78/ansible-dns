---
all:
  children:
    # Nodo Proxmox VE — usato solo per creare il template e provisioning VM
    proxmox:
      hosts:
        pve:
          ansible_host: 192.168.1.5         # IP del nodo Proxmox
          ansible_user: root
          ansible_become: true

    dns_primary:
      hosts:
        ns-primary:
          ansible_host: 192.168.1.10        # IP privato/locale hidden primary
          ansible_user: ansible
          ansible_become: true

    dns_secondary:
      hosts:
        ns1:
          ansible_host: 203.0.113.10        # VPS pubblico 1
          ansible_user: ansible
          ansible_become: true
          dns_secondary_index: 1
        ns2:
          ansible_host: 203.0.113.20        # VPS pubblico 2
          ansible_user: ansible
          ansible_become: true
          dns_secondary_index: 2
        # Aggiungi ns3, ns4, ns5 allo stesso modo
        # ns3:
        #   ansible_host: 203.0.113.30
        #   ansible_user: ansible
        #   ansible_become: true
        #   dns_secondary_index: 3

    # Router OpenWrt per DDNS (opzionale)
    openwrt_routers:
      hosts: {}
