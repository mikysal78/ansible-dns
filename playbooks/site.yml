---
# ============================================================
# PLAYBOOK PRINCIPALE — Infrastruttura DNS
# Uso: ansible-playbook playbooks/site.yml --ask-vault-pass
# ============================================================

# ------------------------------------------------------------
# WireGuard PRIMA di tutto: il tunnel deve esistere prima che
# BIND tenti i transfer. Gira su TUTTI gli host DNS insieme
# (+ wg_extra_peers, es. Proxmox/PBS: peer per client nsupdate
# esterni come l'ACME built-in) perché il template peer ha
# bisogno delle chiavi pubbliche di tutti gli host (via hostvars)
# — un'unica play assicura che i fact di ogni host siano già
# disponibili quando si renderizza il template sugli altri
# (stesso step, batch). Il ruolo packages è saltato sui peer
# extra: non tocchiamo il pacchettizzo di host che non fanno
# parte della topologia DNS, solo wireguard.
# ------------------------------------------------------------
- name: Setup tunnel WireGuard (primary + secondari + peer extra)
  hosts: dns_primary:dns_secondary:wg_extra_peers
  become: true
  tags: [wireguard]
  roles:
    - role: packages        # garantisce pacchetti base prima del tunnel
      when: "'dns_primary' in group_names or 'dns_secondary' in group_names"
    - role: wireguard

- name: Deploy DNS Primary (hidden master)
  hosts: dns_primary
  become: true
  roles:
    - role: hardening       # hardening OS (ssh, sysctl, fs, auditd, fail2ban...)
    - role: nftables        # firewall (primary: solo secondari e localhost)
      tags: [nftables]
    - role: bind9_primary   # BIND9 hidden master + zone files
    - role: dnssec          # inline signing DNSSEC
    - role: monitoring      # monitoring
    - role: acme_dns       # DNS-01 via nsupdate locale → propagazione ai secondari pubblici

# serial: 1 → i secondari vengono aggiornati UNO alla volta: se un
# handler riavvia bind9 (o una config è rotta), l'altro NS pubblico
# resta sempre in servizio e la risoluzione non si interrompe mai.
- name: Deploy DNS Secondari (pubblici)
  hosts: dns_secondary
  become: true
  serial: 1
  roles:
    - role: hardening
    - role: nftables        # firewall (secondari: pubblico con rate limiting)
    - role: bind9_secondary
      tags: [bind9_secondary]

- name: Configura DDNS su router OpenWrt
  hosts: openwrt_routers
  become: true
  gather_facts: false
  roles:
    - role: ddns_openwrt

# ------------------------------------------------------------
# Riepilogo deploy: infrastruttura, accessi, cert, vault.
# -e reveal_secrets=false  → nasconde i valori sensibili
# ------------------------------------------------------------
- name: Riepilogo deploy
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    reveal_secrets: true
    # Host derivati dai gruppi inventory: nessun hostname cablato,
    # il riepilogo funziona qualunque nome abbiano gli host.
    _primary_host: "{{ groups['dns_primary'][0] }}"
    _primary: "{{ hostvars[_primary_host]['ansible_host'] }}"
    _ssh_port: "{{ hostvars[_primary_host]['ansible_port'] | default(2400) }}"
    # Porte monitoring (da roles/monitoring/defaults/main.yml)
    _grafana_port: 3000
    _prometheus_port: 9090
    _alertmanager_port: 9093
    # Chiavi vault da mostrare
    _vault_keys:
      - vault_tsig_secret
      - vault_ddns_secret
      - vault_acme_email
      - vault_grafana_admin_password
      - vault_alertmanager_smtp_password
      - vault_proxmox_token_secret
  tasks:

    - name: "INFRASTRUTTURA — primary"
      ansible.builtin.debug:
        msg:
          - "Primary (hidden):  {{ _primary }}:{{ _ssh_port }}  [SSH root]"
          - "WireGuard primary: {{ hostvars[_primary_host]['wg_address'] | default('-') }}"

    - name: "INFRASTRUTTURA — secondari"
      ansible.builtin.debug:
        msg: >-
          {{ item }} (pubblico): {{ hostvars[item]['ansible_host'] }}
          [wg={{ hostvars[item]['wg_address'] | default('-') }}]
      loop: "{{ groups['dns_secondary'] | default([]) }}"

    - name: "ZONE DNS"
      ansible.builtin.debug:
        msg: >-
          {{ item.name }}
          [tipo={{ item.type }}]
          [ddns={{ item.ddns_enabled | default(false) }}]
      loop: "{{ dns_zones }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "MONITORING — accesso"
      ansible.builtin.debug:
        msg:
          - "Grafana:        http://{{ _primary }}:{{ _grafana_port }}"
          - "  utente:       {{ grafana_admin_user | default('admin') }}"
          - "  password:     {{ vault_grafana_admin_password
                                if (reveal_secrets | bool)
                                else '*** (usa -e reveal_secrets=false per nascondere)' }}"
          - "Prometheus:     http://{{ _primary }}:{{ _prometheus_port }}"
          - "Alertmanager:   http://{{ _primary }}:{{ _alertmanager_port }}"
          - ""
          - "Accesso da notebook (SSH tunnel):"
          - "  ssh -p {{ _ssh_port }} -N \\"
          - "    -L {{ _grafana_port }}:127.0.0.1:{{ _grafana_port }} \\"
          - "    -L {{ _prometheus_port }}:127.0.0.1:{{ _prometheus_port }} \\"
          - "    -L {{ _alertmanager_port }}:127.0.0.1:{{ _alertmanager_port }} \\"
          - "    root@{{ _primary }}"
          - "  Poi apri: http://localhost:{{ _grafana_port }}"
          - ""
          - "NOTA: nftables limita l'accesso a monitoring_allowed_sources."
          - "      Se non usi il tunnel, aggiungi il tuo IP in"
          - "      group_vars/all/main.yml → monitoring_allowed_sources"
          - "      e rilancia: make deploy"

    - name: "MONITORING — SMTP alerts"
      ansible.builtin.debug:
        msg:
          - "SMTP abilitato:  {{ alertmanager_smtp_enabled | default(false) }}"
          - "SMTP host:       {{ alertmanager_smtp_host | default('non configurato') }}"
          - "SMTP from:       {{ alertmanager_smtp_from | default('non configurato') }}"
          - "SMTP to:         {{ alertmanager_smtp_to | default('non configurato') }}"
          - "Webhook Slack:   {{ alertmanager_webhook_enabled | default(false) }}"

    - name: "CERTIFICATI ACME"
      ansible.builtin.debug:
        msg:
          - "Dominio:  {{ item.domain }}"
          - "  file:   {{ acme_certs_dir }}/{{ item.domain }}.{fullchain.pem,key}"
          - "  deploy: {{ item.deploy | map(attribute='host') | join(', ')
                          if (item.deploy is defined)
                          else 'solo primary (nessun CT configurato)' }}"
          - "  reload: {{ item.deploy | map(attribute='reload_cmd') | join(' | ')
                          if (item.deploy is defined) else '-' }}"
      loop: "{{ acme_domains }}"
      loop_control:
        label: "{{ item.domain }}"

    - name: "CT CONSUMER"
      ansible.builtin.debug:
        msg:
          - "{{ item }}  →  {{ hostvars[item]['ansible_host'] }}:{{ hostvars[item]['ansible_port'] | default(22) }}"
          - "  cert:    {{ hostvars[item]['cert_domain'] | default('non configurato') }}"
          - "  reload:  {{ hostvars[item]['cert_reload_cmd'] | default('-') }}"
      loop: "{{ groups['cert_consumers'] | default([]) }}"

    - name: "VAULT — stato variabili"
      ansible.builtin.debug:
        msg: >-
          {{ item }}:
          {{ 'NON definita'
             if (lookup('vars', item, default='') | string | length == 0)
             else (lookup('vars', item)
                   if (reveal_secrets | bool)
                   else 'definita (' ~ (lookup('vars', item) | string | length) ~ ' char)') }}
      loop: "{{ _vault_keys }}"
      loop_control:
        label: "{{ item }}"
