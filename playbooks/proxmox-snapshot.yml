---
# ============================================================
# PLAYBOOK — proxmox-snapshot.yml
# Gestione snapshot VM DNS primary
#
# Uso:
#   # Crea snapshot
#   ansible-playbook playbooks/proxmox-snapshot.yml \
#     --ask-vault-pass -e "snap_action=create snap_name=pre-deploy-dns"
#
#   # Lista snapshot
#   ansible-playbook playbooks/proxmox-snapshot.yml \
#     --ask-vault-pass -e "snap_action=list"
#
#   # Rollback a snapshot
#   ansible-playbook playbooks/proxmox-snapshot.yml \
#     --ask-vault-pass -e "snap_action=rollback snap_name=pre-deploy-dns"
#
#   # Elimina snapshot
#   ansible-playbook playbooks/proxmox-snapshot.yml \
#     --ask-vault-pass -e "snap_action=delete snap_name=pre-deploy-dns"
# ============================================================

- name: "Proxmox — Gestione snapshot VM DNS"
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    snap_action:    "list"     # create | list | rollback | delete
    snap_name: "manual-{{ ansible_date_time.date }}"
    snap_desc: "Snapshot manuale — {{ ansible_date_time.iso8601 }}"

  tasks:

    # --- LISTA ---
    - name: Lista snapshot esistenti
      ansible.builtin.uri:
        url: "https://{{ proxmox_host }}:{{ proxmox_port }}/api2/json/nodes/{{ proxmox_node }}/qemu/{{ proxmox_primary_vmid }}/snapshot"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_user }}!{{ proxmox_token_id }}={{ vault_proxmox_token_secret }}"
        validate_certs: "{{ proxmox_verify_ssl }}"
      register: snapshots_list
      when: snap_action == "list"

    - name: Mostra snapshot
      ansible.builtin.debug:
        msg: |
          Snapshot VM {{ proxmox_primary_name }} (VMID {{ proxmox_primary_vmid }}):
          {% for snap in snapshots_list.json.data | default([]) %}
          - {{ snap.name | ljust(30) }} {{ snap.description | default('') }}
            Creato: {{ snap.snaptime | default('N/A') }}
          {% endfor %}
      when: snap_action == "list"

    # --- CREA ---
    - name: Crea snapshot
      community.proxmox.proxmox_snap:
        api_host:         "{{ proxmox_host }}"
        api_port:         "{{ proxmox_port }}"
        api_user:         "{{ proxmox_user }}"
        api_token_id:     "{{ proxmox_token_id }}"
        api_token_secret: "{{ vault_proxmox_token_secret }}"
        vmid:             "{{ proxmox_primary_vmid }}"
        snapname:         "{{ snap_name }}"
        description:      "{{ snap_desc }}"
        vmstate:          false
        state:            present
        validate_certs:   "{{ proxmox_verify_ssl }}"
      when: snap_action == "create"
      register: snap_create

    - name: Conferma creazione snapshot
      ansible.builtin.debug:
        msg: "Snapshot '{{ snap_name }}' creato su VMID {{ proxmox_primary_vmid }}"
      when: snap_action == "create" and snap_create.changed

    # --- ROLLBACK ---
    - name: "Conferma rollback (operazione distruttiva)"
      ansible.builtin.pause:
        prompt: |
          ATTENZIONE: rollback a '{{ snap_name }}' su VM {{ proxmox_primary_name }}.
          Lo stato corrente della VM verrà PERSO.
          Premi INVIO per continuare o Ctrl+C per annullare.
      when: snap_action == "rollback"

    - name: Ferma VM prima del rollback
      community.proxmox.proxmox_kvm:
        api_host:         "{{ proxmox_host }}"
        api_port:         "{{ proxmox_port }}"
        api_user:         "{{ proxmox_user }}"
        api_token_id:     "{{ proxmox_token_id }}"
        api_token_secret: "{{ vault_proxmox_token_secret }}"
        node:             "{{ proxmox_node }}"
        vmid:             "{{ proxmox_primary_vmid }}"
        state:            stopped
        force:            true
        validate_certs:   "{{ proxmox_verify_ssl }}"
      when: snap_action == "rollback"

    - name: Esegui rollback snapshot
      ansible.builtin.uri:
        url: "https://{{ proxmox_host }}:{{ proxmox_port }}/api2/json/nodes/{{ proxmox_node }}/qemu/{{ proxmox_primary_vmid }}/snapshot/{{ snap_name }}/rollback"
        method: POST
        headers:
          Authorization: "PVEAPIToken={{ proxmox_user }}!{{ proxmox_token_id }}={{ vault_proxmox_token_secret }}"
        validate_certs: "{{ proxmox_verify_ssl }}"
      register: rollback_task
      when: snap_action == "rollback"

    - name: Attendi completamento rollback
      ansible.builtin.uri:
        url: "https://{{ proxmox_host }}:{{ proxmox_port }}/api2/json/nodes/{{ proxmox_node }}/tasks/{{ rollback_task.json.data }}/status"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ proxmox_user }}!{{ proxmox_token_id }}={{ vault_proxmox_token_secret }}"
        validate_certs: "{{ proxmox_verify_ssl }}"
      register: rollback_status
      retries: 30
      delay: 5
      until: rollback_status.json.data.status == "stopped"
      when: snap_action == "rollback"

    - name: Riavvia VM dopo rollback
      community.proxmox.proxmox_kvm:
        api_host:         "{{ proxmox_host }}"
        api_port:         "{{ proxmox_port }}"
        api_user:         "{{ proxmox_user }}"
        api_token_id:     "{{ proxmox_token_id }}"
        api_token_secret: "{{ vault_proxmox_token_secret }}"
        node:             "{{ proxmox_node }}"
        vmid:             "{{ proxmox_primary_vmid }}"
        state:            started
        validate_certs:   "{{ proxmox_verify_ssl }}"
      when: snap_action == "rollback"

    # --- ELIMINA ---
    - name: Elimina snapshot
      community.proxmox.proxmox_snap:
        api_host:         "{{ proxmox_host }}"
        api_port:         "{{ proxmox_port }}"
        api_user:         "{{ proxmox_user }}"
        api_token_id:     "{{ proxmox_token_id }}"
        api_token_secret: "{{ vault_proxmox_token_secret }}"
        vmid:             "{{ proxmox_primary_vmid }}"
        snapname:         "{{ snap_name }}"
        state:            absent
        validate_certs:   "{{ proxmox_verify_ssl }}"
      when: snap_action == "delete"
