---
# ============================================================
# PLAYBOOK — Verifica stato DNSSEC e prossime rotazioni chiavi
# Uso: ansible-playbook playbooks/dnssec-status.yml --ask-vault-pass
# ============================================================

- name: Stato DNSSEC
  hosts: dns_primary
  become: true

  tasks:
    - name: Stato chiavi DNSSEC (dnssec-settime)
      ansible.builtin.shell:
        cmd: |
          for key in /var/lib/bind/keys/K*.key; do
            echo "=== $key ==="
            dnssec-settime -p all "$key"
          done
        executable: /bin/bash
      register: key_status
      changed_when: false

    - name: Mostra stato chiavi
      ansible.builtin.debug:
        var: key_status.stdout_lines

    - name: Verifica firma zone
      ansible.builtin.command:
        cmd: "rndc dnssec -status {{ item.name }}"
      loop: "{{ dns_zones }}"
      register: dnssec_zone_status
      changed_when: false
      failed_when: false

    - name: Mostra stato zone DNSSEC
      ansible.builtin.debug:
        var: dnssec_zone_status.results

    - name: DS Records dalle KSK (flag 257) — da pubblicare al registrar
      ansible.builtin.shell:
        cmd: |
          # Trova tutte le KSK (flag 257) per la zona e calcola il DS record SHA-256
          ksk=$(grep -l 'DNSKEY 257' /var/lib/bind/keys/K{{ item.name }}.+*.key 2>/dev/null | head -1)
          if [ -n "$ksk" ]; then
            dnssec-dsfromkey -a SHA-256 "$ksk"
          else
            echo "Nessuna KSK trovata per {{ item.name }}"
          fi
        executable: /bin/bash
      loop: "{{ dns_zones }}"
      register: ds_output
      changed_when: false
      failed_when: false

    - name: "=== DS RECORDS — da inserire al registrar del dominio ==="
      ansible.builtin.debug:
        msg: |
          Zona: {{ item.item.name }}
          {% if item.stdout | length > 0 %}
          {{ item.stdout }}

          Formato registrar:  <Key Tag>  <Algoritmo>  <Digest Type>  <Digest>
          Esempio campi:
            Key Tag:      primo numero dopo DS
            Algorithm:    15  (Ed25519)
            Digest Type:  2   (SHA-256)
            Digest:       stringa esadecimale finale
          {% else %}
          Nessuna KSK trovata — DNSSEC non attivo per questa zona.
          {% endif %}
      loop: "{{ ds_output.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Verifica ruleset nftables attivo
      ansible.builtin.command:
        cmd: nft list ruleset
      register: nft_ruleset
      changed_when: false

    - name: Mostra ruleset nftables
      ansible.builtin.debug:
        var: nft_ruleset.stdout_lines
      when: ansible_verbosity >= 1
