---
# ============================================================
# PLAYBOOK — Copia certificati dal primary ai CT consumer
# Gira dal control node (questa macchina), non dal primary.
# Uso: ansible-playbook playbooks/cert-deploy.yml --ask-vault-pass
# ============================================================

- name: Preleva certificati dal primary
  hosts: dns_primary
  become: true
  tasks:
    - name: Crea directory locale temporanea
      ansible.builtin.file:
        path: "/tmp/acme-deploy"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false

    - name: Fetch certificati dal primary
      ansible.builtin.fetch:
        src: "{{ acme_certs_dir }}/{{ item.0.domain }}.{{ item.1 }}"
        dest: "/tmp/acme-deploy/{{ item.0.domain }}.{{ item.1 }}"
        flat: true
      loop: "{{ acme_domains | product(['fullchain.pem', 'key']) | list }}"

- name: Distribuisce certificati ai CT consumer
  hosts: cert_consumers
  become: true
  tasks:
    - name: Crea directory certificati sul CT
      ansible.builtin.file:
        path: "{{ acme_certs_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    # Un host può essere target di più domini (es. un CT mail che serve
    # sia il dominio principale che un dominio ospitato): la fonte di
    # verità è acme_domains[].deploy[].host, non un singolo cert_domain
    # in inventory, che non potrebbe rappresentare più domini per host.
    - name: Determina i domini da distribuire su questo host
      ansible.builtin.set_fact:
        _my_certs: "{{ _my_certs | default([]) + [{'domain': item.domain, 'reload_cmd': (item.deploy | selectattr('host', 'equalto', ansible_host) | map(attribute='reload_cmd') | first)}] }}"
      loop: "{{ acme_domains | selectattr('deploy', 'defined') | list }}"
      loop_control:
        label: "{{ item.domain }}"
      when: ansible_host in (item.deploy | map(attribute='host') | list)

    - name: Copia fullchain
      ansible.builtin.copy:
        src: "/tmp/acme-deploy/{{ item.domain }}.fullchain.pem"
        dest: "{{ acme_certs_dir }}/{{ item.domain }}.fullchain.pem"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ _my_certs }}"
      loop_control:
        label: "{{ item.domain }}"

    - name: Copia chiave privata
      ansible.builtin.copy:
        src: "/tmp/acme-deploy/{{ item.domain }}.key"
        dest: "{{ acme_certs_dir }}/{{ item.domain }}.key"
        owner: root
        group: root
        mode: "0640"
      loop: "{{ _my_certs }}"
      loop_control:
        label: "{{ item.domain }}"

    - name: Ricarica i servizi per i domini distribuiti
      ansible.builtin.shell: "{{ item }}" # noqa: command-instead-of-shell no-changed-when
      changed_when: true
      loop: "{{ _my_certs | map(attribute='reload_cmd') | unique | list }}"
