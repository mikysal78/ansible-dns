---
# ============================================================
# PLAYBOOK — Aggiorna TUTTE le zone DNS
# ------------------------------------------------------------
# Aggiorna zone dirette statiche, zone DDNS e zone reverse riusando
# la sola parte 'zones' del ruolo bind9_primary: NON ripete
# installazione pacchetti, chiavi né opzioni globali, quindi è
# rapido e non riavvia il servizio (solo reload).
#
# Uso:
#   ansible-playbook playbooks/update-zones.yml --ask-vault-pass
#
#   # Per rigenerare anche la BASE delle zone DDNS dal file YAML.
#   # ATTENZIONE: i record dinamici registrati dai client tornano ai
#   # placeholder finché i client non si ri-registrano (TTL basso):
#   ansible-playbook playbooks/update-zones.yml --ask-vault-pass \
#     -e dns_force_ddns_rewrite=true
# ============================================================

- name: Aggiorna tutte le zone DNS
  hosts: dns_primary
  become: true
  gather_facts: true

  vars:
    # Zone dirette non-DDNS: solo queste hanno un serial gestito da noi
    # e quindi verificabile sui secondari (le DDNS hanno serial guidato
    # dagli update nsupdate dei client).
    static_forward_zones: "{{ dns_zones | rejectattr('ddns_enabled', 'equalto', true) | list }}"

  tasks:
    - name: Esegui solo la parte 'zones' del ruolo bind9_primary
      ansible.builtin.import_role:
        name: bind9_primary
        tasks_from: zones

    - name: Applica i reload in sospeso prima della verifica
      ansible.builtin.meta: flush_handlers

    - name: Verifica propagazione del serial sui secondari
      ansible.builtin.command:
        cmd: "dig +short +time=5 SOA {{ item.0.name }} @{{ item.1 }}"
      loop: "{{ static_forward_zones | product(dns_secondary_ips) | list }}"
      loop_control:
        label: "{{ item.0.name }} @ {{ item.1 }}"
      register: secondary_verify
      changed_when: false
      retries: 6
      delay: 5
      until: (zone_serials[item.0.name] | string) in (secondary_verify.stdout | default(''))
      failed_when: false

    - name: Report propagazione sui secondari
      ansible.builtin.debug:
        msg: >-
          {{ item.item.0.name }} @{{ item.item.1 }}:
          {{ ('OK serial=' ~ zone_serials[item.item.0.name])
             if (zone_serials[item.item.0.name] | string) in (item.stdout | default(''))
             else ('NON ancora propagato (' ~ (item.stdout | default('timeout') | trim) ~ ')') }}
      loop: "{{ secondary_verify.results | default([]) }}"
      loop_control:
        label: "{{ item.item.0.name }}"

    - name: Riepilogo serial zone dirette
      ansible.builtin.debug:
        msg: "{{ item.name }} -> serial {{ zone_serials[item.name] }}"
      loop: "{{ static_forward_zones }}"
      loop_control:
        label: "{{ item.name }}"
