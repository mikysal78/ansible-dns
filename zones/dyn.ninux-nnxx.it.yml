---
# ============================================================
# ZONA DDNS: dyn.ninux-nnxx.it
# Record aggiornati dinamicamente dai router OpenWrt
# ============================================================

zone:
  name: "dyn.ninux-nnxx.it"
  ttl: 60                # TTL basso per aggiornamenti rapidi

  soa:
    primary_ns: "ns1.ninux-nnxx.it."
    admin:      "hostmaster.ninux-nnxx.it."
    serial:     1
    refresh:    300
    retry:      60
    expire:     3600
    minimum:    60

  ns:
    - "ns1.ninux-nnxx.it."
    - "ns2.ninux-nnxx.it."

  # Record statici iniziali (i router aggiorneranno gli IP via nsupdate)
  a:
    - name: "router-matera"
      ip: "10.27.0.1"          # placeholder, sovrascritto da DDNS
      ttl: 60
    - name: "router-salandra"
      ip: "10.27.22.1"
      ttl: 60
    - name: "router-grassano"
      ip: "10.27.10.1"
      ttl: 60

  # Nessun record fisso oltre NS/SOA
  cname: []
  mx: []
  txt: []
  srv: []
  caa: []
  tlsa: []
