---
# ============================================================
# ZONA DDNS: dyn.example.com
# Record aggiornati dinamicamente dai router OpenWrt
# ============================================================

zone:
  name: "dyn.example.com"
  ttl: 60                # TTL basso per aggiornamenti rapidi

  soa:
    primary_ns: "ns1.example.com."
    admin:      "hostmaster.example.com."
    serial:     1
    refresh:    300
    retry:      60
    # expire ALTO anche in una zona dinamica: è il tempo dopo cui i
    # SECONDARI smettono di servire la zona se non raggiungono il primary.
    # Con un valore basso (es. 3600) basta 1 ora di primary irraggiungibile
    # per far sparire la zona dai NS pubblici. 14 giorni, come le altre zone.
    expire:     1209600
    minimum:    60

  ns:
    - "ns1.example.com."
    - "ns2.example.com."

  # Record statici iniziali (i router aggiorneranno gli IP via nsupdate)
  a:
    - name: "router-home"
      ip: "0.0.0.0"          # placeholder, sovrascritto da DDNS
      ttl: 60
    - name: "router-office"
      ip: "0.0.0.0"
      ttl: 60
    - name: "router-branch"
      ip: "0.0.0.0"
      ttl: 60

  # Nessun record fisso oltre NS/SOA
  cname: []
  mx: []
  txt: []
  srv: []
  caa: []
  tlsa: []
