---
# ============================================================
# TASKS — acme_dns
# Installa acme.sh e ottiene certificati wildcard + statici
# via DNS-01 challenge con il plugin ufficiale dns_nsupdate
# (RFC 2136 / DDNS sul primary BIND9)
#
# Versione acme.sh: imposta `acme_version` a un tag preciso
# (es. "3.1.3") per un deploy deterministico. Se lasciata vuota
# o non definita, il ruolo rileva da solo l'ultimo tag pubblicato.
# ============================================================

- name: Installa dipendenze acme.sh
  ansible.builtin.apt:
    name:
      - curl
      - socat
      - dnsutils
      - cron
    state: present
    update_cache: true

# --- Risoluzione versione acme.sh --------------------------------------------
# Nota: "3.1.4" è la VER dichiarata dentro master ma NON è un tag pubblicato;
# l'ultimo tag reale va sempre letto dai releases, non dallo script.
- name: Rileva ultima release acme.sh
  ansible.builtin.uri:
    url: "https://api.github.com/repos/acmesh-official/acme.sh/releases/latest"
    return_content: true
  register: _acme_release
  when: acme_version | default('') | length == 0

- name: Imposta acme_version dall'ultima release
  ansible.builtin.set_fact:
    acme_version: "{{ _acme_release.json.tag_name }}"
  when: acme_version | default('') | length == 0

- name: Mostra la versione acme.sh in uso
  ansible.builtin.debug:
    msg: "acme.sh versione: {{ acme_version }}"

# --- Directory ---------------------------------------------------------------
- name: Crea directory certificati
  ansible.builtin.file:
    path: "{{ acme_certs_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Crea directory acme.sh home
  ansible.builtin.file:
    path: "{{ acme_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Crea directory sorgente acme.sh
  ansible.builtin.file:
    path: "{{ acme_install_dir }}/src"
    state: directory
    owner: root
    group: root
    mode: "0755"

# --- Installazione acme.sh ---------------------------------------------------
- name: Scarica acme.sh
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/acmesh-official/acme.sh/{{ acme_version }}/acme.sh"
    dest: "{{ acme_install_dir }}/src/acme.sh"
    mode: "0755"

- name: Installa acme.sh
  ansible.builtin.command:
    cmd: >
      ./acme.sh --install
      --home {{ acme_install_dir }}
      --config-home {{ acme_install_dir }}/config
      --cert-home {{ acme_certs_dir }}
      --accountemail {{ acme_email }}
      --no-cron
    chdir: "{{ acme_install_dir }}/src"
    creates: "{{ acme_install_dir }}/acme.sh"

# acme.sh scaricato come file singolo NON porta con sé la cartella dnsapi/,
# e non fa download on-demand degli hook: il plugin va messo esplicitamente
# in {{ acme_install_dir }}/dnsapi/ altrimenti --dns dns_nsupdate fallisce con
# "Cannot find DNS API hook for: dns_nsupdate".
- name: Crea directory dnsapi di acme.sh
  ansible.builtin.file:
    path: "{{ acme_install_dir }}/dnsapi"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Scarica hook DNS-01 dns_nsupdate (RFC 2136)
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/acmesh-official/acme.sh/{{ acme_version }}/dnsapi/dns_nsupdate.sh"
    dest: "{{ acme_install_dir }}/dnsapi/dns_nsupdate.sh"
    owner: root
    group: root
    mode: "0755"

- name: Registra account ACME
  ansible.builtin.command:
    cmd: >
      {{ acme_install_dir }}/acme.sh
      --register-account
      -m {{ acme_email }}
      --server {{ acme_server }}
      --home {{ acme_install_dir }}
  changed_when: false

# --- Chiave DDNS -------------------------------------------------------------
- name: Deploy file chiave DDNS per nsupdate
  ansible.builtin.template:
    src: nsupdate.key.j2
    dest: "{{ acme_install_dir }}/nsupdate.key"
    owner: root
    group: root
    mode: "0600"

# --- Chiave SSH per deploy certificati ai CT ---------------------------------
- name: Genera chiave SSH per deploy certificati
  ansible.builtin.command:
    cmd: ssh-keygen -t ed25519 -f {{ acme_deploy_key }} -N "" -C "acme-deploy@{{ inventory_hostname }}"
    creates: "{{ acme_deploy_key }}"

- name: Leggi chiave pubblica deploy
  ansible.builtin.slurp:
    src: "{{ acme_deploy_key }}.pub"
  register: _acme_deploy_pubkey

- name: Esponi chiave pubblica come fatto (usata dal play cert_consumers)
  ansible.builtin.set_fact:
    acme_deploy_pubkey: "{{ _acme_deploy_pubkey.content | b64decode | trim }}"

# --- Script di deploy per ogni dominio con target ----------------------------
- name: Deploy script di distribuzione certificati
  ansible.builtin.template:
    src: cert-deploy.sh.j2
    dest: "{{ acme_install_dir }}/deploy-{{ item.domain }}.sh"
    owner: root
    group: root
    mode: "0750"
  loop: "{{ acme_domains }}"
  when: item.deploy is defined

# --- Emissione e installazione certificati -----------------------------------
# NSUPDATE_SERVER e NSUPDATE_KEY sono le variabili lette dal plugin ufficiale
# dns_nsupdate; NSUPDATE_ZONE è opzionale (il primary è autoritativo).
- name: Emetti certificati ACME (wildcard + root)
  ansible.builtin.command:
    cmd: >
      {{ acme_install_dir }}/acme.sh
      --issue
      --dns dns_nsupdate
      -d {{ item.domain }}
      -d "*.{{ item.domain }}"
      --home {{ acme_install_dir }}
      --server {{ acme_server }}
      --keylength {{ item.keylength | default('ec-256') }}
    creates: "{{ acme_certs_dir }}/{{ item.domain }}_ecc/{{ item.domain }}.cer"
  environment:
    NSUPDATE_SERVER: "{{ dns_primary_ip }}"
    NSUPDATE_KEY: "{{ acme_install_dir }}/nsupdate.key"
  loop: "{{ acme_domains }}"

- name: Installa certificati nelle directory finali
  ansible.builtin.command:
    cmd: >
      {{ acme_install_dir }}/acme.sh
      --install-cert
      -d {{ item.domain }}
      --key-file   {{ acme_certs_dir }}/{{ item.domain }}.key
      --fullchain-file {{ acme_certs_dir }}/{{ item.domain }}.fullchain.pem
      --reloadcmd  "{{ (acme_install_dir ~ '/deploy-' ~ item.domain ~ '.sh') if item.deploy is defined else acme_reload_cmd }}"
      --home {{ acme_install_dir }}
  loop: "{{ acme_domains }}"
  changed_when: false

# Il log dei rinnovi cresce all'infinito senza rotazione: 6 mesi bastano
# per diagnosticare un rinnovo fallito (i cert durano 90 giorni).
- name: Configura logrotate per il log dei rinnovi
  ansible.builtin.copy:
    dest: /etc/logrotate.d/acme-renew
    content: |
      /var/log/acme-renew.log {
          monthly
          rotate 6
          compress
          missingok
          notifempty
      }
    owner: root
    group: root
    mode: "0644"

- name: Configura cron per rinnovo automatico
  ansible.builtin.cron:
    name: "acme.sh renew"
    minute: "30"
    hour: "2"
    job: >
      {{ acme_install_dir }}/acme.sh
      --cron
      --home {{ acme_install_dir }}
      >> /var/log/acme-renew.log 2>&1
    user: root
