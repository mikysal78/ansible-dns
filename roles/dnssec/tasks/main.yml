---
# ============================================================
# TASKS — dnssec
# Configura DNSSEC con inline signing su BIND9
# Gira solo sul PRIMARY (è lui che firma)
# ============================================================

# Usato durante migrazione algoritmo (es. alg15→alg13): rimuove le vecchie chiavi
# prima che BIND le ricarichi con la nuova policy. Eseguire con:
#   ansible-playbook ... -e dnssec_force_regen=true
- name: Rimuovi vecchie chiavi e journal DNSSEC (migrazione algoritmo)
  ansible.builtin.shell:
    cmd: |
      systemctl stop bind9
      rm -f {{ dnssec_key_directory }}/K*
      rm -f {{ bind_zones_dir }}/*.jnl
      rm -f {{ bind_zones_dir }}/*.signed
      systemctl start bind9
    executable: /bin/bash
  when: dnssec_force_regen | default(false) | bool
  changed_when: true

- name: Forza re-signing zone dopo regen chiavi
  ansible.builtin.command:
    cmd: "rndc sign {{ item.name }}"
  loop: "{{ dns_zones }}"
  when: dnssec_force_regen | default(false) | bool
  changed_when: true
  failed_when: false

- name: Crea directory chiavi DNSSEC
  ansible.builtin.file:
    path: "{{ dnssec_key_directory }}"
    state: directory
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0700"

- name: Deploy named.conf.options con dnssec-policy
  ansible.builtin.template:
    src: named.conf.options-dnssec.j2
    dest: "{{ bind_config_dir }}/named.conf.options"
    owner: root
    group: "{{ bind_group }}"
    mode: "0640"
  notify: reload bind9

- name: Deploy named.conf.local con dnssec-policy per zona
  ansible.builtin.template:
    src: named.conf.local-dnssec.j2
    dest: "{{ bind_config_dir }}/named.conf.local"
    owner: root
    group: "{{ bind_group }}"
    mode: "0640"
  notify: reload bind9

- name: Ricarica BIND per attivare dnssec-policy
  ansible.builtin.systemd:
    name: bind9
    state: reloaded

- name: Attendi generazione chiavi DNSSEC (fino a 60s)
  ansible.builtin.wait_for:
    path: "{{ dnssec_key_directory }}"
    state: present
    timeout: 60

- name: Verifica che le chiavi siano state generate
  ansible.builtin.find:
    paths: "{{ dnssec_key_directory }}"
    patterns: "K*.key"
  register: dnssec_keys
  failed_when: dnssec_keys.matched == 0

- name: Mostra chiavi DNSSEC generate
  ansible.builtin.debug:
    msg: "Chiavi DNSSEC: {{ dnssec_keys.files | map(attribute='path') | list }}"

# Estrai e mostra i DS record da pubblicare presso il registrar
- name: Genera DS records per ogni zona
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      ksk=$(grep -rl 'DNSKEY 257' {{ dnssec_key_directory }}/ 2>/dev/null | grep "K{{ item.name }}" | head -1)
      [ -n "$ksk" ] && dnssec-dsfromkey -a SHA-256 "$ksk" || true
    executable: /bin/bash
  register: ds_records
  loop: "{{ dns_zones }}"
  changed_when: false
  failed_when: false
  when: dnssec_print_ds

- name: ">>> DS RECORDS DA PUBBLICARE PRESSO IL REGISTRAR <<<"
  ansible.builtin.debug:
    msg: |
      ================================================================
      ZONA: {{ item.item.name }}
      Pubblica questi DS record nel pannello del tuo registrar DNS:

      {{ item.stdout | default('DS record non ancora disponibile — riprova dopo il reload') }}

      ================================================================
  loop: "{{ ds_records.results }}"
  when: dnssec_print_ds and ds_records is defined

- name: Verifica firma zone con dnssec-verify
  ansible.builtin.command:
    cmd: "dnssec-verify -z {{ item.name }} {{ bind_zones_dir }}/db.{{ item.name }}"
  loop: "{{ dns_zones | selectattr('ddns_enabled', 'equalto', false) | list }}"
  register: dnssec_verify
  changed_when: false
  failed_when: false   # Non fallire se la zona non è ancora firmata (primo run)

- name: Mostra risultato verifica DNSSEC
  ansible.builtin.debug:
    var: dnssec_verify.results
  when: ansible_verbosity >= 1
