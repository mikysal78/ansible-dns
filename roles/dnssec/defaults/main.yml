---
# ============================================================
# DEFAULTS — dnssec
# Usa BIND dnssec-policy (inline signing automatico)
# Richiede BIND 9.16+ (Debian Trixie ha 9.20)
# ============================================================

# Il NOME della policy (dnssec-policy "...") è definito una volta sola in
# roles/bind9_primary/defaults/main.yml (bind_dnssec_policy): è quel ruolo
# che dichiara la policy in named.conf.options E la referenzia per zona in
# named.conf.local. Qui restano solo i parametri di TUNING della policy.

# Algoritmo per le chiavi
# ecdsap256sha256 (alg 13) = OVH supporta alg 8-14 → usare questo
# ed25519 (alg 15) = NON supportato da OVH
dnssec_algorithm: "ecdsap256sha256"

# Durata validità firme (signature validity)
dnssec_sig_validity: "P14D"      # 14 giorni
dnssec_sig_refresh:  "P3D"       # rinnova le firme 3 giorni prima della scadenza

# KSK (Key Signing Key) — rotazione annuale
dnssec_ksk_lifetime: "P1Y"       # 1 anno
dnssec_ksk_algorithm: "ecdsap256sha256"

# ZSK (Zone Signing Key) — rotazione trimestrale
dnssec_zsk_lifetime: "P90D"      # 90 giorni
dnssec_zsk_algorithm: "ecdsap256sha256"

# NSEC3 per oscurare l'enumerazione delle zone
# Se false usa NSEC (più semplice ma enumerabile)
dnssec_use_nsec3: true
dnssec_nsec3_iterations: 0       # 0 è raccomandato da RFC 9276 (2022)
dnssec_nsec3_salt_length: 0      # salt vuoto raccomandato

# Directory dove BIND salva le chiavi DNSSEC. Stessa directory usata da
# bind_dnssec_key_directory (role bind9_primary, key-directory per zona):
# referenziata da lì per non duplicare il valore in due posti scollegati.
dnssec_key_directory: "{{ bind_dnssec_key_directory | default('/var/lib/bind/keys') }}"

# DS record: dopo la firma, il role stampa i DS record
# da inviare al registrar per la chain of trust
dnssec_print_ds: true

# Migrazione algoritmo: rimuove le vecchie chiavi e le rigenera con la nuova policy.
# Usare solo quando si cambia algoritmo (es. alg15→alg13). Passa -e dnssec_force_regen=true
dnssec_force_regen: false
