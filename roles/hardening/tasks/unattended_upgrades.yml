---
# ============================================================
# TASK — unattended_upgrades.yml
# Patch automatiche di sicurezza (NO reboot automatico)
# ============================================================

- name: Installa unattended-upgrades
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present

- name: Deploy configurazione unattended-upgrades
  ansible.builtin.template:
    src: unattended-upgrades.conf.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"

- name: Abilita aggiornamenti automatici
  ansible.builtin.template:
    src: apt-auto-upgrades.conf.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"

- name: Abilita servizio unattended-upgrades
  ansible.builtin.systemd:
    name: unattended-upgrades
    enabled: true
    state: started
