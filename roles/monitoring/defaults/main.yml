---
# ============================================================
# DEFAULTS — monitoring
# Prometheus + Alertmanager + Grafana girano sul CT dedicato
# (gruppo monitoring_server); gli host DNS espongono solo gli
# exporter, raggiunti via WireGuard.
# ============================================================

# --- Versioni (aggiorna qui per upgradare) ---
prometheus_version: "2.51.2"
node_exporter_version: "1.8.0"
bind_exporter_version: "0.7.0"
alertmanager_version: "0.27.0"
grafana_version: "13.1.0"

# --- Porte ---
prometheus_port: 9090
node_exporter_port: 9100
bind_exporter_port: 9119
alertmanager_port: 9093
grafana_port: 3000

# --- Indirizzi di ascolto ---
# Exporter sugli host DNS: 0.0.0.0 (nftables limita l'accesso al solo
# IP WireGuard del monitoring server). Binding su tutte le interfacce
# = l'exporter parte anche se wg0 non è ancora su.
exporter_listen_addr: "0.0.0.0"
# GUI (Prometheus/Alertmanager/Grafana) sul CT: solo loopback —
# l'accesso dalla LAN passa dal reverse proxy nginx sulla :80,
# che smista per nome host (grafana/prometheus/alertmanager).
monitoring_gui_listen_addr: "127.0.0.1"
monitoring_proxy_port: 80

# --- Directory ---
prometheus_dir: "/opt/prometheus"
prometheus_data_dir: "/var/lib/prometheus"
alertmanager_dir: "/opt/alertmanager"
alertmanager_data_dir: "/var/lib/alertmanager"
grafana_data_dir: "/var/lib/grafana"

# --- Retention ---
prometheus_retention: "30d"
prometheus_retention_size: "10GB"

# --- Scrape interval ---
prometheus_scrape_interval: "15s"
prometheus_evaluation_interval: "15s"

# --- Alertmanager ---
# Configura almeno uno tra email e webhook
alertmanager_smtp_enabled: false
alertmanager_smtp_host: "smtp.example.com:587"
alertmanager_smtp_from: "alerts@example.com"
alertmanager_smtp_to: "admin@example.com"
alertmanager_smtp_username: "alerts@example.com"
alertmanager_smtp_password: "{{ vault_alertmanager_smtp_password | default('CHANGE_ME') }}"

alertmanager_webhook_enabled: false
alertmanager_webhook_url: "https://hooks.slack.com/services/CHANGE_ME"

# --- Grafana ---
grafana_admin_user: "admin"
grafana_admin_password: "{{ vault_grafana_admin_password | default('CHANGE_ME') }}"
grafana_domain: "{{ ansible_host | default('grafana.example.com') }}"
# Accesso HTTP diretto dalla LAN (niente TLS): root_url con IP e
# cookie_secure disattivato, altrimenti il login via http non funziona.
grafana_root_url: "http://{{ grafana_domain }}/"
grafana_cookie_secure: false
grafana_allow_anonymous: false

# --- Domini vhost del reverse proxy nginx sul CT ---
prometheus_domain: "prometheus.example.com"
alertmanager_domain: "alertmanager.example.com"

# --- IP autorizzati ad accedere alle GUI (Grafana/Prometheus/Alertmanager) ---
# Usato dal template nftables del monitoring server.
monitoring_allowed_sources:
  - "127.0.0.1"
  # - "10.27.22.0/24"   # LAN — impostato in group_vars/all/main.yml

# --- Bind exporter: porte BIND da monitorare ---
bind_exporter_bind_stats_url: "http://localhost:8053/json/v1"
