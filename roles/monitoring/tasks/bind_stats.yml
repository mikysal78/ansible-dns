---
# ============================================================
# TASK — bind_stats.yml
# Abilita il canale statistiche HTTP di BIND9
# Necessario per bind_exporter
# ============================================================

- name: Deploy named.conf.statistics (statistics-channels)
  ansible.builtin.template:
    src: named.conf.statistics.j2
    dest: "{{ bind_config_dir }}/named.conf.statistics"
    owner: root
    group: "{{ bind_group }}"
    mode: "0640"
    validate: "named-checkconf %s"
  notify: reload bind9

- name: Includi statistics-channels in named.conf
  ansible.builtin.lineinfile:
    path: "{{ bind_config_dir }}/named.conf"
    line: 'include "{{ bind_config_dir }}/named.conf.statistics";'
    state: present
  notify: reload bind9
