---
# ============================================================
# TASK — alertmanager.yml
# ============================================================

- name: Crea utente sistema alertmanager
  ansible.builtin.user:
    name: alertmanager
    system: true
    shell: /sbin/nologin
    create_home: false

- name: Crea directory alertmanager
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: alertmanager
    group: alertmanager
    mode: "0755"
  loop:
    - "{{ alertmanager_dir }}"
    - "{{ alertmanager_data_dir }}"

- name: Scarica Alertmanager
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager_version }}/alertmanager-{{ alertmanager_version }}.linux-amd64.tar.gz"
    dest: "/tmp/alertmanager-{{ alertmanager_version }}.tar.gz"
    mode: "0644"

- name: Estrai Alertmanager
  ansible.builtin.unarchive:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.tar.gz"
    dest: /tmp
    remote_src: true

- name: Installa binari alertmanager
  ansible.builtin.copy:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  loop:
    - alertmanager
    - amtool
  notify: restart alertmanager

- name: Deploy alertmanager.yml
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: "{{ alertmanager_dir }}/alertmanager.yml"
    owner: alertmanager
    group: alertmanager
    mode: "0640"
  notify: reload alertmanager

- name: Deploy systemd unit alertmanager
  ansible.builtin.template:
    src: alertmanager.service.j2
    dest: /etc/systemd/system/alertmanager.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart alertmanager

- name: Abilita e avvia alertmanager
  ansible.builtin.systemd:
    name: alertmanager
    enabled: true
    state: started
    daemon_reload: true
