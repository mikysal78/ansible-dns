---
# ============================================================
# TASK — snapshot.yml
# Crea snapshot post-creazione come baseline pre-deploy DNS
# ============================================================

- name: Crea snapshot baseline post cloud-init
  community.general.proxmox_snap:
    api_host:         "{{ proxmox_host }}"
    api_port:         "{{ proxmox_port }}"
    api_user:         "{{ proxmox_user }}"
    api_token_id:     "{{ proxmox_token_id }}"
    api_token_secret: "{{ vault_proxmox_token_secret }}"
    vmid:             "{{ proxmox_primary_vmid }}"
    snapname:         "{{ proxmox_snapshot_name }}"
    description:      "{{ proxmox_snapshot_description }} — {{ ansible_date_time.iso8601 }}"
    vmstate:          false             # snapshot disco senza RAM (più veloce)
    state:            present
    validate_certs:   "{{ proxmox_verify_ssl }}"
  delegate_to: localhost
  register: snapshot_result

- name: Mostra risultato snapshot
  ansible.builtin.debug:
    msg: "Snapshot '{{ proxmox_snapshot_name }}' creato su VMID {{ proxmox_primary_vmid }}"
  when: snapshot_result.changed
