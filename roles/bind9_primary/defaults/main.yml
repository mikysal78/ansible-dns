---
# Defaults per il role bind9_primary

# DNSSEC inline signing: impostare uguale a dnssec_policy_name del role dnssec.
# Lasciare vuoto per disabilitare DNSSEC nelle dichiarazioni di zona.
bind_dnssec_policy: "dns-infra-policy"
bind_dnssec_key_directory: "/var/lib/bind/keys"
bind_packages:
  - bind9
  - bind9utils
  - bind9-doc
  - python3-dnspython

bind_options_listen_on: "any"
bind_options_listen_on_v6: "any"
bind_recursion: "no"
bind_dnssec_validation: "auto"
bind_querylog: "yes"

# Abilita NOTIFY verso i secondari
bind_notify: "yes"

# Indirizzi dei secondari COSÌ COME LI VEDE IL PRIMARIO. Il primario è
# dietro NAT e tutto (AXFR, NOTIFY, query SOA di refresh) passa sul
# WireGuard, quindi i secondari contattano il primario dalla loro
# interfaccia WG: questi IP servono sia per l'ACL allow-query sia per i
# NOTIFY. Il primario è dietro NAT e gli AXFR passano
# sul WireGuard: i secondari hanno `allow-notify { <ip-wg-primario>; }`,
# quindi accettano i NOTIFY SOLO se arrivano dal canale WG. Qui usiamo
# gli indirizzi WireGuard dei secondari (dall'inventory); se nessuno ha
# wg_address, ripieghiamo sugli IP pubblici (comportamento precedente).
dns_secondary_peer_ips: >-
  {{ (groups['dns_secondary'] | default([])
      | map('extract', hostvars, 'wg_address')
      | select('defined') | list) or (dns_secondary_ips | default([])) }}

# Numero massimo di trasferimenti in uscita simultanei
bind_transfers_out: 10

# Riscrittura forzata delle zone DDNS dal file YAML.
# Default false: le zone con ddns_enabled vengono solo "seedate" la prima volta
# e i record sono poi gestiti dai client via nsupdate (il file su disco NON viene
# sovrascritto, per non perdere gli aggiornamenti dinamici e non confliggere col
# journal .jnl). Impostando questo flag a true (es. -e dns_force_ddns_rewrite=true)
# la zona viene rigenerata da YAML con la sequenza rndc freeze -> scrittura -> thaw.
# ATTENZIONE: i record dinamici tornano ai placeholder finché i client non si
# ri-registrano.
dns_force_ddns_rewrite: false
