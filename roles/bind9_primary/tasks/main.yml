---
# ============================================================
# TASKS — bind9_primary
# ------------------------------------------------------------
# Suddiviso in file per consentire run mirati. In particolare la
# parte 'zones' è eseguibile da sola (vedi playbooks/update-zones.yml,
# import_role tasks_from=zones) per aggiornare tutte le zone senza
# ripetere installazione, chiavi e opzioni globali.
# ============================================================

- name: Installazione pacchetti e filesystem
  ansible.builtin.import_tasks: install.yml

- name: Chiavi TSIG / DDNS
  ansible.builtin.import_tasks: keys.yml

- name: Opzioni globali named
  ansible.builtin.import_tasks: options.yml

- name: Dichiarazioni di zona e zone file (dirette, DDNS, reverse)
  ansible.builtin.import_tasks: zones.yml

- name: Servizio bind9
  ansible.builtin.import_tasks: service.yml
