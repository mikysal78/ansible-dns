---
# ============================================================
# bind9_primary — DICHIARAZIONI DI ZONA E ZONE FILE
# ------------------------------------------------------------
# Eseguibile anche da solo (playbooks/update-zones.yml,
# import_role tasks_from=zones) per aggiornare tutte le zone
# — dirette statiche, DDNS e reverse — senza ripetere
# installazione, chiavi e opzioni globali.
#
# Serial: idempotente. Il file viene prima rigenerato col serial
# CORRENTE (se i record non cambiano resta identico → nessuna
# modifica); il serial viene incrementato SOLO per le zone i cui
# record sono effettivamente cambiati.
# ============================================================

- name: Deploy named.conf.local (dichiarazioni di zona)
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: "{{ bind_config_dir }}/named.conf.local"
    owner: root
    group: "{{ bind_group }}"
    mode: "0640"
    validate: "named-checkconf %s"
  notify: reload bind9

- name: Rileva host con IP misti pubblico/privato (avviso)
  ansible.builtin.set_fact:
    mixed_ip_hosts: "{{ lookup('template', 'mixed_ip_warnings.j2') | from_yaml }}"

- name: Avvisa se ci sono host con IP misti pubblico/privato
  ansible.builtin.debug:
    msg: >-
      ATTENZIONE: i seguenti host hanno record A che mescolano IP pubblici e
      privati sotto lo stesso nome. Da fuori rete i client potrebbero tentare
      l'IP privato (irraggiungibile). Valuta nomi distinti (es. host.internal)
      o split-horizon. Host: {{ mixed_ip_hosts | join(' | ') }}
  when: mixed_ip_hosts | length > 0

# ------------------------------------------------------------
# SERIAL CORRENTE
# ------------------------------------------------------------
- name: Rileva il serial SOA corrente delle zone dirette
  ansible.builtin.command:
    cmd: "dig +short @127.0.0.1 SOA {{ item.name }}"
  register: soa_query
  changed_when: false
  failed_when: false
  loop: "{{ dns_zones }}"
  loop_control:
    label: "{{ item.name }}"

- name: Mappa zona → serial corrente (0 se la zona non esiste ancora)
  ansible.builtin.set_fact:
    zone_cur_serial: >-
      {{ zone_cur_serial | default({}) | combine({
        item.item.name: (((item.stdout.split() | length) > 2)
                         | ternary(item.stdout.split()[2] | default('0'), '0'))
      }) }}
  loop: "{{ soa_query.results }}"
  loop_control:
    label: "{{ item.item.name }}"

# ------------------------------------------------------------
# ZONE STATICHE (ddns_enabled = false)
# Passata 1: render col serial corrente → idempotente se i record
# non cambiano. Se cambiano, il task risulta "changed".
# ------------------------------------------------------------
- name: Genera zone file statiche (serial corrente)
  ansible.builtin.template:
    src: zone.db.j2
    dest: "{{ bind_zones_dir }}/db.{{ item.name }}"
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0644"
  loop: "{{ dns_zones }}"
  loop_control:
    label: "{{ item.name }}"
  when: not (item.ddns_enabled | default(false))
  vars:
    zone_data: "{{ lookup('file', dns_zones_dir_src + '/' + item.file) | from_yaml }}"
    zone_serial_override: "{{ zone_cur_serial[item.name] }}"
  register: zone_render

# Passata 2a: inizializza zone_serials col serial CORRENTE per ogni zona
# statica, cambiata o meno. Così zone_serials è una mappa completa
# ("serial scritto per ciascuna zona") e i consumer a valle
# (es. verifica propagazione sui secondari in update-zones.yml) non
# trovano mai una chiave indefinita per le zone non modificate.
- name: Inizializza zone_serials col serial corrente (tutte le zone statiche)
  ansible.builtin.set_fact:
    zone_serials: >-
      {{ zone_serials | default({}) | combine({
        item.name: (zone_cur_serial[item.name] | int)
      }) }}
  loop: "{{ dns_zones | rejectattr('ddns_enabled', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.name }}"

# Passata 2b: SOLO per le zone i cui record sono cambiati, incrementa
# il serial (monotòno, mai sotto YYYYMMDD01) e riscrivi → reload.
- name: Calcola nuovo serial per le zone modificate
  ansible.builtin.set_fact:
    zone_serials: >-
      {{ zone_serials | default({}) | combine({
        item.item.name: [
          (zone_cur_serial[item.item.name] | int) + 1,
          ((ansible_facts.date_time.date | replace('-', '')) ~ '00') | int + 1
        ] | max
      }) }}
  loop: "{{ zone_render.results | default([]) | rejectattr('skipped', 'defined') | selectattr('changed') | list }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Riscrivi le zone statiche modificate con serial incrementato
  ansible.builtin.template:
    src: zone.db.j2
    dest: "{{ bind_zones_dir }}/db.{{ item.item.name }}"
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0644"
  loop: "{{ zone_render.results | default([]) | rejectattr('skipped', 'defined') | selectattr('changed') | list }}"
  loop_control:
    label: "{{ item.item.name }}"
  vars:
    zone_data: "{{ lookup('file', dns_zones_dir_src + '/' + item.item.file) | from_yaml }}"
    zone_serial_override: "{{ zone_serials[item.item.name] }}"
  notify: reload bind9

# ------------------------------------------------------------
# ZONE DDNS — SEED (default): scrive il file SOLO se non esiste.
# I record sono poi gestiti dai client via nsupdate.
# ------------------------------------------------------------
- name: Seed iniziale zone DDNS (solo se il file non esiste)
  ansible.builtin.template:
    src: zone.db.j2
    dest: "{{ bind_zones_dir }}/db.{{ item.name }}"
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0644"
    force: false
  loop: "{{ dns_zones }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.ddns_enabled | default(false)
    - not (dns_force_ddns_rewrite | default(false))
  vars:
    zone_data: "{{ lookup('file', dns_zones_dir_src + '/' + item.file) | from_yaml }}"
    zone_serial_override: "{{ (ansible_facts.date_time.date | replace('-', '')) ~ '01' }}"
  notify: reload bind9

# ------------------------------------------------------------
# ZONE DDNS — RISCRITTURA FORZATA (opt-in: dns_force_ddns_rewrite=true)
#   rndc freeze → scrittura (serial più alto) → rndc thaw (ricarica)
# ATTENZIONE: i record dinamici tornano ai placeholder finché i
# client non si ri-registrano.
# ------------------------------------------------------------
- name: Freeze delle zone DDNS prima della riscrittura forzata
  ansible.builtin.command:
    cmd: "rndc freeze {{ item.name }}"
  loop: "{{ dns_zones }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.ddns_enabled | default(false)
    - dns_force_ddns_rewrite | default(false)
  changed_when: true

- name: Riscrivi le zone DDNS da YAML (riscrittura forzata)
  ansible.builtin.template:
    src: zone.db.j2
    dest: "{{ bind_zones_dir }}/db.{{ item.name }}"
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0644"
    force: true
  loop: "{{ dns_zones }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.ddns_enabled | default(false)
    - dns_force_ddns_rewrite | default(false)
  vars:
    zone_data: "{{ lookup('file', dns_zones_dir_src + '/' + item.file) | from_yaml }}"
    zone_serial_override: >-
      {{ [ (zone_cur_serial[item.name] | int) + 1,
           ((ansible_facts.date_time.date | replace('-', '')) ~ '00') | int + 1 ] | max }}

- name: Thaw delle zone DDNS (ricarica il file e riabilita gli update dinamici)
  ansible.builtin.command:
    cmd: "rndc thaw {{ item.name }}"
  loop: "{{ dns_zones }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.ddns_enabled | default(false)
    - dns_force_ddns_rewrite | default(false)
  changed_when: true

- name: Verifica sintassi zone files
  ansible.builtin.command:
    cmd: "named-checkzone {{ item.name }} {{ bind_zones_dir }}/db.{{ item.name }}"
  loop: "{{ dns_zones }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false

# ============================================================
# ZONE REVERSE AUTOMATICHE (da CIDR)
# ============================================================

- name: Calcola metadati zone reverse dal CIDR
  ansible.builtin.set_fact:
    reverse_zones_computed: "{{ reverse_zones_computed | default([]) + [rev | combine(lookup('template', 'reverse_meta.j2') | from_yaml)] }}"
  loop: "{{ dns_reverse_zones | default([]) }}"
  loop_control:
    loop_var: rev

- name: Genera zone reverse da YAML per ogni rete
  ansible.builtin.template:
    src: zone.reverse.db.j2
    dest: "{{ bind_zones_dir }}/db.{{ rev.zone_name }}"
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0644"
  loop: "{{ reverse_zones_computed | default([]) }}"
  loop_control:
    loop_var: rev
  vars:
    rev_ptr_records: "{{ lookup('template', 'reverse_ptr_collect.j2') | from_yaml }}"
  notify: reload bind9

- name: Verifica sintassi zone reverse
  ansible.builtin.command:
    cmd: "named-checkzone {{ rev.zone_name }} {{ bind_zones_dir }}/db.{{ rev.zone_name }}"
  loop: "{{ reverse_zones_computed | default([]) }}"
  loop_control:
    loop_var: rev
  changed_when: false
