---
# ============================================================
# TASKS — packages
# Installa pacchetti base, utils, sicurezza
# Rimuove pacchetti non necessari
# ============================================================

- name: Aggiorna cache apt
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Installa pacchetti base
  ansible.builtin.apt:
    name: "{{ packages_base }}"
    state: present

# Best-effort: alcuni util potrebbero non esistere su Trixie. Installandoli
# uno per uno, un pacchetto mancante non blocca gli altri (con la lista unica
# apt fallirebbe l'intera transazione senza installarne nessuno). Un errore
# reale (mirror giù, lock dpkg, dipendenze rotte) fa comunque fallire il task.
- name: Installa pacchetti di monitoring e utilità (best-effort)
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop: "{{ packages_utils }}"
  register: utils_install
  failed_when:
    - utils_install.failed | default(false)
    - "'no installation candidate' not in (utils_install.msg | default(''))"
    - "'Unable to locate package' not in (utils_install.msg | default(''))"

- name: Installa pacchetti di sicurezza
  ansible.builtin.apt:
    name: "{{ packages_security }}"
    state: present

# state=absent è idempotente: se il pacchetto non è installato apt non fallisce,
# quindi non serve ignorare errori (che maschererebbe problemi reali di dpkg).
- name: Rimuovi pacchetti non necessari
  ansible.builtin.apt:
    name: "{{ packages_to_remove }}"
    state: absent
    purge: true

- name: Esegui autoremove
  ansible.builtin.apt:
    autoremove: true

- name: Abilita sysstat per raccolta metriche storiche
  ansible.builtin.lineinfile:
    path: /etc/default/sysstat
    regexp: "^ENABLED="
    line: 'ENABLED="true"'
  notify: restart sysstat

- name: Configura logwatch per report giornaliero
  ansible.builtin.lineinfile:
    path: /etc/logwatch/conf/logwatch.conf
    regexp: "^MailTo"
    line: "MailTo = root"
    create: true
    owner: root
    group: root
    mode: "0644"

- name: Verifica se BIND9 è già installato
  ansible.builtin.stat:
    path: /usr/sbin/named
  register: named_binary

- name: Mostra versione BIND9 installata
  ansible.builtin.command:
    cmd: named -v
  register: bind_version
  changed_when: false
  when: named_binary.stat.exists

- name: Info versione
  ansible.builtin.debug:
    msg: "BIND9: {{ bind_version.stdout }}"
  when: named_binary.stat.exists and bind_version.stdout is defined
