---
# ============================================================
# TASKS — bind9_secondary
# ============================================================

- name: Installa pacchetti BIND9
  ansible.builtin.apt:
    name:
      - bind9
      - bind9utils
    state: present
    update_cache: true

- name: Crea directory log
  ansible.builtin.file:
    path: "{{ bind_log_dir }}"
    state: directory
    owner: "{{ bind_user }}"
    group: "{{ bind_group }}"
    mode: "0755"

- name: Deploy TSIG key file (stessa chiave del primary)
  ansible.builtin.template:
    src: tsig.key.j2
    dest: "{{ bind_config_dir }}/tsig-axfr.key"
    owner: root
    group: "{{ bind_group }}"
    mode: "0640"
  notify: reload bind9

- name: Deploy named.conf.options (secondary)
  ansible.builtin.template:
    src: named.conf.options.j2
    dest: "{{ bind_config_dir }}/named.conf.options"
    owner: root
    group: "{{ bind_group }}"
    mode: "0640"
    validate: "named-checkconf %s"
  notify: restart bind9

- name: Deploy named.conf.local (secondary zone declarations)
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: "{{ bind_config_dir }}/named.conf.local"
    owner: root
    group: "{{ bind_group }}"
    mode: "0640"
    validate: "named-checkconf %s"
  notify: reload bind9

- name: Assicura che bind9 sia abilitato e avviato
  ansible.builtin.systemd:
    name: bind9
    enabled: true
    state: started
